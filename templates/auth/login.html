{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TrackIt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body { background: #F9FAFB; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .auth-logo-icon { width: 40px; height: 40px; border-radius: 10px; background: #FF6B2C; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
    .auth-logo span { font-size: 22px; font-weight: 800; color: #1F2937; }
    .auth-title { font-size: 26px; font-weight: 800; color: #111827; margin-bottom: 6px; }
    .auth-sub { font-size: 14px; color: #6B7280; margin-bottom: 28px; }
    .form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-control { border-radius: 10px; border: 1px solid #D1D5DB; padding: 12px 14px; font-size: 14px; font-family: inherit; }
    .form-control:focus { border-color: #FF6B2C; box-shadow: 0 0 0 3px rgba(255,107,44,0.12); }
    .btn-auth { width: 100%; padding: 13px; border: none; border-radius: 10px; background: #FF6B2C; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; transition: background .2s; margin-top: 6px; }
    .btn-auth:hover { background: #E55A1F; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #6B7280; }
    .auth-footer a { color: #FF6B2C; font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .error-msg { background: #FEF2F2; color: #991B1B; border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 500; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">T</div>
      <span>TrackIt</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to continue tracking your progress</p>

    {% if error %}
      <div class="error-msg" role="alert">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
    {% endif %}

    <form id="loginForm" method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">

      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" name="username"
               placeholder="Enter your username" autocomplete="username"
               aria-required="true">
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" id="password" type="password" name="password"
               placeholder="Enter your password" autocomplete="current-password"
               aria-required="true">
      </div>

      <div id="clientError" class="error-msg" style="display:none;" role="alert"></div>

      <button class="btn-auth" type="submit">
        <i class="fas fa-sign-in-alt"></i> Log In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value.trim();
      const err = document.getElementById("clientError");
      if (!u || !p) {
        e.preventDefault();
        err.style.display = "block";
        err.textContent = "Username and password are required.";
      }
    });
  </script>
</body>
</html>
