{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block head %}
<style>
  /* 整页布局 */
  .login-page{
    min-height:100vh;
    background:#ffffff;
    display:flex;
    flex-direction:column;
  }

  /* 顶部灰条 */
  .login-topbar{
    height:56px;
    background:#f3f4f6;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
  }

  /* 居中区域 */
  .login-main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;   /* ✅ 强制水平居中 */
    padding:24px;
  }

  /* 让标题+卡片作为整体居中 */
  .login-panel{
    width:520px;
    display:flex;
    flex-direction:column;
    align-items:center;       /* ✅ 标题也居中 */
  }

  .login-title{
    font-size:34px;
    font-weight:800;
    margin:0 0 18px 0;
    letter-spacing:.2px;
  }

  /* 卡片更像 wireframe：细边框 + 轻阴影 */
  .login-card{
    width:420px;                     /* ✅ 稍微大一点更像图 */
    background:#fff;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:22px 24px;
    box-shadow:0 2px 6px rgba(0,0,0,.06);
  }

  .field{ margin-bottom:14px; }

  .label{
    display:block;
    font-size:14px;
    font-weight:600;
    color:#374151;
    margin-bottom:6px;
  }

  /* 输入框更扁平 */
  .input{
    width:90%;
    height:44px;
    border:1px solid #d1d5db;
    border-radius:8px;
    padding:0 14px;
    font-size:15px;
    background:#fff;
    outline:none;
  }
  .input:focus{
    border-color:#9ca3af;
    box-shadow:0 0 0 3px rgba(156,163,175,.25);
  }

  /* 按钮更贴近 wireframe：宽、扁、灰 */
  .btn{
    width:100%;
    height:46px;
    border:none;
    border-radius:8px;
    background:#6b7280;
    color:#fff;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    margin-top:10px;
  }
  .btn:hover{ background:#4b5563; }

  .error{
    color:#dc2626;
    font-size:13px;
    margin-top:10px;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-topbar">Learning & Activity Booking System</div>

  <div class="login-main">
    <div class="login-panel">
      <h1 class="login-title">Login</h1>

      <div class="login-card">
        <form id="loginForm" method="post" novalidate>
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ request.GET.next }}">

          <div class="field">
            <label class="label" for="username">Username</label>
            <input class="input" id="username" name="username" placeholder="Username" autocomplete="username">
          </div>

          <div class="field">
            <label class="label" for="password">Password</label>
            <input class="input" id="password" type="password" name="password" placeholder="Password" autocomplete="current-password">
          </div>

          <button class="btn" type="submit">Login</button>
          <div style="margin-top:12px; text-align:center;">
            <a href="{% url 'register' %}">Register</a>
            &nbsp;|&nbsp;
            <a href="{% url 'password_reset' %}">Forgot password</a>
          </div>

          <div id="clientError" class="error" style="display:none;"></div>
          {% if error %}
            <div class="error">{{ error }}</div>
          {% endif %}
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  const err = document.getElementById("clientError");
  if(!u || !p){
    e.preventDefault();
    err.style.display = "block";
    err.textContent = "Email 和 Password 不能为空";
  }
});
</script>
{% endblock %}
